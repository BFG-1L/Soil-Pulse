<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Soil Pulse · Country‑Identified Map</title>
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- PapaParse -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a140a;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(10, 20, 10, 0.92);
      backdrop-filter: blur(8px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2e5a2e;
      z-index: 10;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo i {
      font-size: 2rem;
      color: #8bc34a;
    }
    .logo h1 {
      color: white;
      font-size: 1.6rem;
      letter-spacing: 1px;
    }
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      background: #2e8b57;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #2e8b57;
      color: #c8e6c9;
    }
    .btn-outline:hover {
      background: #2e8b57;
      color: white;
    }
    .btn:hover {
      background: #1f6e46;
      transform: translateY(-2px);
    }
    .file-label {
      background: #1a3a2a;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .file-label:hover {
      background: #2e5a2e;
    }
    #file-input {
      display: none;
    }
    .stats {
      background: #1e2a1e;
      padding: 0.4rem 1rem;
      border-radius: 60px;
      color: #b9f6ca;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .map-container {
      flex: 1;
      margin: 20px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      border: 3px solid #2e8b57;
      position: relative;
    }
    #global-map {
      height: calc(100vh - 120px);
      width: 100%;
    }
    .legend-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      padding: 8px 14px;
      border-radius: 20px;
      color: #e0f2e0;
      font-size: 0.7rem;
      z-index: 1000;
      border-left: 4px solid #8bc34a;
      pointer-events: none;
    }
    .footer {
      text-align: center;
      padding: 0.7rem;
      color: #a5d6a7;
      background: rgba(10, 20, 10, 0.85);
      font-size: 0.8rem;
    }
    .popup-loading {
      font-style: italic;
      color: #666;
    }
    @media (max-width: 720px) {
      .header { padding: 0.8rem 1rem; }
      .logo h1 { font-size: 1.2rem; }
      .controls { gap: 8px; }
      .btn, .file-label { padding: 0.4rem 1rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <i class="fa-solid fa-leaf"></i>
    <h1>Soil Pulse · Country‑Level Intelligence</h1>
  </div>
  <div class="controls">
    <label for="file-input" class="file-label">
      <i class="fa-solid fa-upload"></i> Upload CSV (Soil Data)
    </label>
    <input type="file" id="file-input" accept=".csv">
    <button class="btn" id="reset-view-btn">🌍 Reset View</button>
    <div class="stats" id="stats-indicator">📊 Ready — upload CSV</div>
  </div>
</div>

<div class="map-container">
  <div id="global-map"></div>
  <div class="legend-panel">
    <strong>📍 Land‑Only Soil Points</strong><br>
    Click any marker → country + soil profile
  </div>
</div>
<div class="footer">
  🌱 All points on dry land. Country names via OpenStreetMap Nominatim (reverse geocoding). Each marker shows real agronomic data.
</div>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script>
  // ------------------------------------------------------------
  //  LAND-ONLY COORDINATE DATABASE (global agricultural zones)
  // ------------------------------------------------------------
  const LAND_COORDINATES = [

  // ------------------------------------------------------------
  //  Global map & clustering
  // ------------------------------------------------------------
  let map = null;
  let markerClusterGroup = null;
  let currentMarkers = [];

  function initMap() {
    if (map) return;
    map = L.map('global-map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors'
    }).addTo(map);
    markerClusterGroup = L.markerClusterGroup({ chunkedLoading: true, maxClusterRadius: 70 });
    map.addLayer(markerClusterGroup);
  }

  // deterministic land coordinate picker (hash -> index in LAND_COORDINATES)
  function getLandCoordinate(record, index) {
    const seed = `${record.Name || ''}_${record.Soil_Type || ''}_${index}`;
    let hash = 0;
    for (let i = 0; i < seed.length; i++) {
      hash = ((hash << 5) - hash) + seed.charCodeAt(i);
      hash |= 0;
    }
    const absHash = Math.abs(hash);
    const coordIndex = absHash % LAND_COORDINATES.length;
    const [baseLat, baseLng] = LAND_COORDINATES[coordIndex];
    const latJitter = ((absHash >> 8) % 300) / 1000 - 0.15;
    const lngJitter = ((absHash >> 12) % 300) / 1000 - 0.15;
    return [baseLat + latJitter, baseLng + lngJitter];
  }

  // Reverse geocoding using Nominatim (OpenStreetMap)
  // Returns country name as string, or "Unknown location"
  async function fetchCountryName(lat, lng) {
    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=3&addressdetails=1&accept-language=en`;
    try {
      const response = await fetch(url, {
        headers: { 'User-Agent': 'SoilPulse_WebApp/1.0' }
      });
      const data = await response.json();
      if (data && data.address && data.address.country) {
        return data.address.country;
      } else if (data && data.display_name) {
        // fallback: extract country from display name (simple)
        const parts = data.display_name.split(',');
        return parts[parts.length - 1].trim();
      }
      return "Unknown region";
    } catch (err) {
      console.warn("Geocoding failed", err);
      return "Location unavailable";
    }
  }

  // Build base popup content (without country, will be updated)
  function buildPopupContentBase(record) {
    const name = record.Name || "Unnamed soil";
    const fertility = record.Fertility || "N/A";
    const soilType = record.Soil_Type || "N/A";
    const pH = record.pH ? parseFloat(record.pH).toFixed(1) : "N/A";
    const pHCategory = record.Category_pH || "N/A";
    const nitrogen = record.Nitrogen ? parseFloat(record.Nitrogen).toFixed(1) : "N/A";
    const phosphorus = record.Phosphorus ? parseFloat(record.Phosphorus).toFixed(1) : "N/A";
    const potassium = record.Potassium ? parseFloat(record.Potassium).toFixed(1) : "N/A";
    const temperature = record.Temperature ? parseFloat(record.Temperature).toFixed(1) : "N/A";
    const rainfall = record.Rainfall ? parseFloat(record.Rainfall).toFixed(0) : "N/A";
    const season = record.Season || "N/A";
    const photoperiod = record.Photoperiod || "N/A";
    
    let recommendation = "Balanced fertilization with organic matter recommended.";
    if (nitrogen !== "N/A" && nitrogen < 70) recommendation = "⚠️ Low nitrogen: add legumes or nitrogen-rich manure.";
    else if (phosphorus !== "N/A" && phosphorus < 40) recommendation = "🔹 Low phosphorus: apply rock phosphate or bone meal.";
    else if (potassium !== "N/A" && potassium < 50) recommendation = "🍂 Low potassium: use potash or wood ash.";
    if (pHCategory === "strongly_acidic" || pHCategory === "moderately_acidic")
      recommendation += " Apply lime to raise pH for most crops.";
    else if (pHCategory === "alkaline")
      recommendation += " Use sulfur or organic mulch to lower pH.";
    
    let suggestedCrops = "—";
    if (soilType.includes("Loam") && (pHCategory === "neutral" || pHCategory === "slightly_acidic"))
      suggestedCrops = "Wheat, corn, soybeans, vegetables, berries";
    else if (soilType.includes("Sandy") && (pHCategory === "neutral" || pHCategory === "slightly_acidic"))
      suggestedCrops = "Root crops, peanuts, melons, carrots, potatoes";
    else if (soilType.includes("Clay") && pHCategory === "neutral")
      suggestedCrops = "Rice, broccoli, cabbage, beans, pumpkins";
    else if (pHCategory === "alkaline")
      suggestedCrops = "Asparagus, spinach, barley, sugar beets, cabbage";
    else if (pHCategory === "strongly_acidic")
      suggestedCrops = "Blueberries, potatoes, radishes, sweet potatoes, azaleas";
    
    return `
      <div style="min-width: 280px; max-width: 360px; font-family: system-ui; line-height: 1.45;">
        <h4 style="margin:0 0 6px 0; color: #2b5e2b; font-weight: 700;">🌾 ${name}</h4>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; font-size: 0.85rem;">
          <span><strong>🌍 Country:</strong> <span class="country-placeholder">loading...</span></span>
          <span><strong>🌱 Soil:</strong> ${soilType}</span>
          <span><strong>⚗️ pH:</strong> ${pH} (${pHCategory})</span>
          <span><strong>🧪 N-P-K:</strong> ${nitrogen} / ${phosphorus} / ${potassium}</span>
          <span><strong>💪 Fertility:</strong> ${fertility}</span>
          <span><strong>🌡️ Temp:</strong> ${temperature} °C</span>
          <span><strong>☔ Rainfall:</strong> ${rainfall} mm</span>
          <span><strong>📅 Season:</strong> ${season}</span>
          <span><strong>☀️ Photoperiod:</strong> ${photoperiod}</span>
    `;
  }

  // Update existing popup content with country name (after geocoding)
  function updatePopupWithCountry(popupElement, countryName) {
    if (!popupElement || !popupElement._contentNode) return;
    const countrySpan = popupElement._contentNode.querySelector('.country-placeholder');
    if (countrySpan) {
      countrySpan.innerText = countryName;
    }
  }

  // Clear previous markers
  function clearMarkers() {
    if (markerClusterGroup) markerClusterGroup.clearLayers();
    currentMarkers = [];
  }

  // Load CSV data and create markers with dynamic country lookup on popup open
  function loadSoilDataFromCSV(csvText) {
    Papa.parse(csvText, {
      header: true,
      skipEmptyLines: true,
      dynamicTyping: true,
      complete: (results) => {
        const data = results.data;
        if (!data || data.length === 0) {
          document.getElementById('stats-indicator').innerHTML = "⚠️ No valid data in CSV.";
          return;
        }
        clearMarkers();
        let validPoints = 0;
        for (let idx = 0; idx < data.length; idx++) {
          const row = data[idx];
          if (!row.Name && !row.Soil_Type) continue;
          const coords = getLandCoordinate(row, idx);
          const marker = L.marker(coords, { title: row.Name || "Soil Sample", riseOnHover: true });
          
          // Create popup with placeholder country
          const baseHtml = buildPopupContentBase(row);
          const popup = L.popup({ maxWidth: 380, minWidth: 260 }).setContent(baseHtml);
          marker.bindPopup(popup);
          
          // When popup opens, fetch country name and update
          marker.on('popupopen', async (e) => {
            const popupObj = e.popup;
            const latlng = marker.getLatLng();
            // avoid duplicate fetches (check if already filled)
            const container = popupObj._contentNode;
            if (container && container.querySelector('.country-placeholder')?.innerText !== 'loading...') return;
            try {
              const country = await fetchCountryName(latlng.lat, latlng.lng);
              updatePopupWithCountry(popupObj, country);
            } catch (err) {
              updatePopupWithCountry(popupObj, "unknown");
            }
          });
          
          markerClusterGroup.addLayer(marker);
          currentMarkers.push(marker);
          validPoints++;
        }
        document.getElementById('stats-indicator').innerHTML = `📈 Land‑based markers: ${validPoints} soil records (total ${data.length} rows)`;
        if (validPoints > 0 && markerClusterGroup.getLayers().length > 0) {
          setTimeout(() => {
            try {
              const bounds = markerClusterGroup.getBounds();
              if (bounds.isValid()) map.fitBounds(bounds, { padding: [30, 30] });
            } catch(e) {}
          }, 100);
        }
      },
      error: (err) => {
        console.error(err);
        document.getElementById('stats-indicator').innerHTML = "❌ CSV parse error.";
      }
    });
  }

  // File upload handler
  function setupFileUpload() {
    const fileInput = document.getElementById('file-input');
    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        loadSoilDataFromCSV(e.target.result);
      };
      reader.readAsText(file, "UTF-8");
      document.getElementById('stats-indicator').innerHTML = "⏳ Processing CSV...";
    });
  }

  // Reset view button
  function setupReset() {
    document.getElementById('reset-view-btn').addEventListener('click', () => {
      if (map) map.setView([20, 0], 2);
    });
  }

  }

  window.addEventListener('DOMContentLoaded', () => {
    initMap();
    setupFileUpload();
    setupReset();
    loadEmbeddedSample();  // instant preview
  });
</script>
</body>
</html>
